name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      artifact: peekpe-linux

                    - os: macos-latest
                      target: x86_64-apple-darwin
                      artifact: peekpe-macos

                    - os: windows-latest
                      target: x86_64-pc-windows-gnu
                      artifact: peekpe-windows.exe

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust (nightly)
              uses: dtolnay/rust-toolchain@nightly
              with:
                  toolchain: nightly
                  targets: ${{ matrix.target }}

            - name: Cache cargo
              uses: Swatinem/rust-cache@v2

            - name: Build release
              run: cargo build --release --target ${{ matrix.target }}

            - name: Prepare artifact
              shell: bash
              run: |
                  set -e

                  mkdir -p dist

                  BIN_NAME="peekpe"

                  if [ "${{ runner.os }}" = "Windows" ]; then
                    cp target/${{ matrix.target }}/release/${BIN_NAME}.exe dist/${{ matrix.artifact }}
                    cd dist
                    certutil -hashfile ${{ matrix.artifact }} SHA256 > checksums.txt
                  else
                    cp target/${{ matrix.target }}/release/${BIN_NAME} dist/${{ matrix.artifact }}
                    cd dist
                    shasum -a 256 ${{ matrix.artifact }} > checksums.txt
                  fi

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact }}
                  path: dist/

    release:
        needs: build
        runs-on: ubuntu-latest

        steps:
            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  name: PeekPe ${{ github.ref_name }}
                  tag_name: ${{ github.ref_name }}
                  body: |
                      ## 🚀 PeekPe Release ${{ github.ref_name }}

                      ### 📦 Binaries
                      - Linux (x86_64)
                      - macOS (x86_64)
                      - Windows (gnu)

                      ### ⚡ Install
                      ```bash
                      curl -fsSL https://get.peekpe.dev/install.sh | sh
                      ```

                      ### 🔐 Checksums included
                  files: dist/**/*
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
